version: '3'

# enttui — schema-driven TUI generator for ent.
#
# Run from the enttui module directory:
#
#   cd enttui && task gen
#
# Or from anywhere with -t / -d:
#
#   task -d enttui gen
#   task -t enttui/Taskfile.yml gen
#
# Tasks:
#   task cli    # build the codegen CLI (../bin/enttui)
#   task gen    # regenerate ./examples/aicoder/gen from ../dbent/schema
#   task build  # gen + build example binary (../bin/enttui-example)
#   task run    # build + launch against a demo DB (override with DB= / PROJECT=)
#   task clean  # remove generated files + bin/* artifacts

vars:
  # ROOT_DIR resolves to this Taskfile's directory (enttui/).
  # REPO_ROOT is one level up.
  REPO_ROOT: "{{.ROOT_DIR}}/.."
  SCHEMA_DIR: "{{.ROOT_DIR}}/../dbent/schema"
  GEN_OUT: "{{.ROOT_DIR}}/examples/aicoder/gen"
  GEN_PKG: enttuigen
  BIN_DIR: "{{.ROOT_DIR}}/../bin"
  EXAMPLE_BIN: "{{.ROOT_DIR}}/../bin/enttui-example"
  CLI_BIN: "{{.ROOT_DIR}}/../bin/enttui"

tasks:
  cli:
    desc: "Build the enttui codegen CLI into ../bin/enttui"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.CLI_BIN}} ./cmd/enttui
      - echo "built {{.CLI_BIN}}"

  gen:
    desc: "Regenerate glue from ../dbent/schema"
    deps: [cli]
    cmds:
      - find {{.GEN_OUT}} -name "register_*.go" -delete 2>/dev/null || true
      - "{{.CLI_BIN}} --schema {{.SCHEMA_DIR}} --out {{.GEN_OUT}} --package {{.GEN_PKG}} --scope project_id"
      - echo "regenerated → {{.GEN_OUT}}"

  build:
    desc: "Build the aicoder example binary into ../bin/enttui-example (does NOT regenerate — run `task gen` first if the schema changed)"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      # sqlite_fts5 build tag — the aicoder demo DB has FTS5 triggers on
      # several tables (memories, etc.). Updates fire those triggers; a
      # binary without fts5 fails with "no such module: fts5".
      - go build -tags sqlite_fts5 -o {{.EXAMPLE_BIN}} ./examples/aicoder
      - echo "built {{.EXAMPLE_BIN}}"

  run:
    desc: "Launch the TUI against a demo DB (override DB / PROJECT to point elsewhere). Builds if needed; does NOT regenerate."
    deps: [build]
    vars:
      DB: '{{default "/Volumes/D/www/projects/khanakia/ai-coder-mini/ai_coder_mini_go/.aicoder/aicoder.db" .DB}}'
      PROJECT: '{{default "prj_019e16108e537324aa99b9132d96f7d9" .PROJECT}}'
      VIEW: '{{default "table" .VIEW}}'
      KIND: '{{default "task" .KIND}}'
    cmds:
      - "{{.EXAMPLE_BIN}} --db {{.DB}} --project {{.PROJECT}} --view {{.VIEW}} --kind {{.KIND}}"

  clean:
    desc: "Remove generated files + binaries"
    cmds:
      - find {{.GEN_OUT}} -name "register_*.go" -delete 2>/dev/null || true
      - rm -f {{.EXAMPLE_BIN}} {{.CLI_BIN}}
